<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mapa de Calor - Proyectos Turísticos</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#1f7a63;
      --bg:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --shadow:0 10px 25px rgba(0,0,0,.15);
      --radius:12px;
    }

    *{box-sizing:border-box;font-family:'Inter',sans-serif}
    html,body{height:100%;margin:0}

    /* Barra logos */
    #top-logos{
      position:fixed;
      top:0;left:0;
      width:100%;
      height:90px;
      background:#fff;
      z-index:1200;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:60px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    #top-logos img{max-height:80px}

    /* Mapa */
    #map{
      height:calc(100% - 90px);
      margin-top:90px;
    }

    /* Filtros */
    #filtros{
      position:absolute;
      top:110px;
      left:16px;
      width:280px;
      background:#fff;
      padding:16px;
      z-index:1100;
      border-radius:12px;
      box-shadow:var(--shadow);
    }

    #filtros h3{margin:0 0 10px;color:var(--primary)}
    #filtros strong{display:block;margin:12px 0 6px;font-size:12px;color:var(--muted)}
    #filtros select{
      width:100%;
      padding:8px;
      border-radius:8px;
      border:1px solid #e5e7eb;
      margin-bottom:6px;
    }
  </style>
</head>

<body>

<!-- LOGOS -->
<div id="top-logos">
  <img src="https://raw.githubusercontent.com/1993otros/map/main/mincit.png">
  <img src="https://raw.githubusercontent.com/1993otros/map/main/fontur.png">
  <img src="https://raw.githubusercontent.com/1993otros/map/main/innpulsa.png">
  <img src="https://raw.githubusercontent.com/1993otros/map/main/empretur.png">
</div>

<!-- FILTROS -->
<div id="filtros">
  <h3>Mapa de Calor</h3>

  <strong>Departamento</strong>
  <select id="filtroDepartamento">
    <option value="TODOS">Todos</option>
  </select>

  <strong>Municipio</strong>
  <select id="filtroMunicipio">
    <option value="TODOS">Todos</option>
  </select>
</div>

<div id="map"></div>

<!-- LIBRERÍAS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<script>

const map = L.map('map').setView([4.6,-74.1],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

let heatLayer;
let allData = [];
let departamentos = {};

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vT48cx5M4uRcoEhSzJhQDvD2SWP-jxPsNeDNYb4EDUvfm4HJGEsVe2Kibzu2EzEkCj-9zIgc2FvI3rP/pub?output=csv";

Papa.parse(sheetURL,{
  download:true,
  header:true,
  skipEmptyLines:true,
  complete:function(results){

    allData = results.data;

    allData.forEach(row=>{

      const lat = parseFloat(row.lat);
      const lng = parseFloat(row.lng);
      if(isNaN(lat)||isNaN(lng)) return;

      if(!departamentos[row.departamento]){
        departamentos[row.departamento]=new Set();
      }
      departamentos[row.departamento].add(row.municipio);
    });

    // llenar departamentos
    Object.keys(departamentos).sort().forEach(dep=>{
      filtroDepartamento.innerHTML += `<option value="${dep}">${dep}</option>`;
    });

    actualizarHeatmap();
  }
});

function actualizarMunicipios(dep){
  filtroMunicipio.innerHTML='<option value="TODOS">Todos</option>';
  if(dep!=="TODOS" && departamentos[dep]){
    Array.from(departamentos[dep]).sort().forEach(m=>{
      filtroMunicipio.innerHTML += `<option value="${m}">${m}</option>`;
    });
  }
}

function actualizarHeatmap(){

  const dep = filtroDepartamento.value;
  const mun = filtroMunicipio.value;

  let puntos = [];

  allData.forEach(row=>{
    const lat = parseFloat(row.lat);
    const lng = parseFloat(row.lng);
    if(isNaN(lat)||isNaN(lng)) return;

    const ok =
      (dep==="TODOS" || row.departamento===dep) &&
      (mun==="TODOS" || row.municipio===mun);

    if(ok){
      puntos.push([lat,lng,0.7]);
    }
  });

  if(heatLayer){
    heatLayer.setLatLngs(puntos);
  }else{
    heatLayer = L.heatLayer(puntos,{
      radius:30,
      blur:25,
      maxZoom:12,
      gradient:{
        0.2:'#00f',
        0.4:'#0ff',
        0.6:'#0f0',
        0.8:'#ff0',
        1.0:'#f00'
      }
    }).addTo(map);
  }

  if(puntos.length>0){
    map.flyToBounds(L.latLngBounds(puntos),{padding:[40,40]});
  }else{
    map.setView([4.6,-74.1],6);
  }
}

filtroDepartamento.addEventListener("change",e=>{
  actualizarMunicipios(e.target.value);
  actualizarHeatmap();
});

filtroMunicipio.addEventListener("change",actualizarHeatmap);

</script>

</body>
</html>
